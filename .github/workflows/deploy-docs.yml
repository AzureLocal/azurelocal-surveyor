name: Deploy Documentation

# IMPORTANT — Pages conflict guard (2026-06-30)
# This repository's single GitHub Pages site (https://azurelocal.cloud/azurelocal-surveyor/)
# serves the Surveyor APP, built and deployed by deploy.yml. This MkDocs job publishes to the
# SAME Pages environment, so any run here REPLACES the live app with the documentation site.
#
# The automatic `push` trigger was removed because syncing docs/** (e.g. docs/changelog.md)
# was silently clobbering the live app. Documentation belongs on its own site
# (surveyor.azurelocal.cloud); until that separate Pages target exists, this workflow is
# manual-only. Do NOT re-add a push trigger or run this on main without moving docs off the
# app's Pages site first — it will take the app offline.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    uses: AzureLocal/platform/.github/workflows/reusable-mkdocs-deploy.yml@main
    with:
      pip-packages: 'mkdocs-material'
